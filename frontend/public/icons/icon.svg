<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8f70"/>
      <stop offset="1" stop-color="#335c46"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- soft glow behind the mark -->
  <circle cx="256" cy="262" r="170" fill="#ffffff" opacity="0.08"/>
  <!-- leaf: two arcs meeting at tip, sprouting from the check's start -->
  <path d="M118 176 C118 108 176 66 236 62 C240 126 196 182 128 186 Z"
